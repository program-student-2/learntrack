<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="48" y1="32" x2="464" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="hi" cx="140" cy="90" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lo" cx="420" cy="450" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1238" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0b1238" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0b1238" flood-opacity="0.35"/>
    </filter>
    <filter id="checkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle background with layered gradients -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="112" fill="url(#hi)"/>
  <rect width="512" height="512" rx="112" fill="url(#lo)"/>

  <!-- Inner hairline border for premium feel -->
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#ffffff" stroke-opacity="0.20" stroke-width="2"/>

  <!-- Ascending bars (sub mark) -->
  <g opacity="0.38" filter="url(#softShadow)">
    <rect x="98"  y="318" width="50" height="92"  rx="18" fill="url(#barGrad)"/>
    <rect x="166" y="276" width="50" height="134" rx="18" fill="url(#barGrad)"/>
    <rect x="234" y="234" width="50" height="176" rx="18" fill="url(#barGrad)"/>
  </g>

  <!-- Bold check (primary mark) -->
  <g filter="url(#softShadow)">
    <path d="M132 274 L228 372 L398 142"
      stroke="#ffffff"
      stroke-width="58"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"/>
  </g>

  <!-- Sparkle accent top-right -->
  <g transform="translate(408 116)" opacity="0.95">
    <path d="M0 -18 L4 -4 L18 0 L4 4 L0 18 L-4 4 L-18 0 L-4 -4 Z" fill="#ffffff"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>
  </g>
  <g transform="translate(372 64)" opacity="0.6">
    <path d="M0 -8 L2 -2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2 -2 Z" fill="#ffffff"/>
  </g>
</svg>
